name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gate-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Offline gate test (mock API)
        run: bash test/run.sh

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Fail only on real warnings and errors; info/style notes never red-badge.
      - run: shellcheck --severity=warning throne-gate.sh test/run.sh
